<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gugleta</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Oswald', sans-serif;
      font-weight: 400;
    }

    #bg-video {
      position: fixed;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%);
      object-fit: cover;
      z-index: 0;
    }

    @media (max-width: 767px) {
      #bg-video {
        width: 100%;
        height: 100%;
        min-width: unset;
        min-height: unset;
        object-fit: contain;
        transform: translate(-50%, -50%) scale(1.2);
      }
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.15);
      z-index: 1;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 40px;
      z-index: 10;
    }

    .logo {
      color: #fff;
      font-size: 1.15rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      text-shadow: 0 1px 6px rgba(0,0,0,0.4);
      user-select: none;
    }

    .contact-btn {
      color: #fff;
      font-size: 1.05rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      text-decoration: none;
      text-shadow: 0 1px 6px rgba(0,0,0,0.4);
      transition: opacity 0.2s ease;
    }

    .contact-btn:hover {
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <video id="bg-video" autoplay muted loop playsinline></video>

  <div class="overlay"></div>

  <nav>
    <span class="logo">Gugleta</span>
    <a class="contact-btn" href="https://www.instagram.com/gugletasucks/" target="_blank" rel="noopener noreferrer">Contact</a>
  </nav>

  <script>
    const video = document.getElementById('bg-video');
    const desktopSrc = 'https://raw.githubusercontent.com/gugletasucks/websitevideo/main/Keune_Final_16_9.mp4';
    const mobileSrc = 'https://raw.githubusercontent.com/gugletasucks/websitevideo/main/Keune_Final_9_16.mp4';

    function setVideoSource() {
      const src = window.innerWidth >= 768 ? desktopSrc : mobileSrc;
      if (video.src !== src) {
        video.src = src;
        video.load();
        video.play();
      }
    }

    setVideoSource();
    window.addEventListener('resize', setVideoSource);
  </script>

</body>
</html>
